services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ofmbot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d ofmbot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
